<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smith Chart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0f0;display:flex;justify-content:center;padding:20px;min-height:100vh}
canvas{display:block;border-radius:8px;border:1px solid #ccc}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.row label{font-size:12px;color:#555;width:22px;flex-shrink:0}
.row input[type=number]{flex:1;font-size:12px;font-family:monospace;padding:4px 7px;border:1px solid #ccc;border-radius:5px;background:#fff;color:#111}
.row input:focus{outline:none;border-color:#1a5fb4}
.row .u{font-size:11px;color:#999;flex-shrink:0}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px}
.mc{background:#f5f5f5;border-radius:5px;padding:6px 10px}
.ml{font-size:9px;color:#888;margin-bottom:1px}
.mv{font-size:11px;font-weight:600;font-family:monospace;color:#111}
.mf{font-size:8px;color:#aaa;font-style:italic;margin-top:2px;font-family:Georgia,'Times New Roman',serif}
.hint{font-size:10px;color:#999;margin-top:3px;text-align:center}
.sec{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.07em;margin:12px 0 7px}
button{padding:6px 8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ccc;border-radius:5px;background:#efefef;color:#111;width:100%;margin-top:0}
button:hover{background:#e0e0e0}
button:active{background:#d5d5d5}
.elem-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.elem-btn{padding:7px 4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #ccc;border-radius:5px;background:#fff;color:#111;text-align:center;line-height:1.3}
.elem-btn:hover{background:#f0f0f0}
.elem-btn.series{border-left:3px solid #1a5fb4}
.elem-btn.shunt{border-left:3px solid #c01c28}
.elem-btn .esym{font-size:14px;font-family:monospace;display:block}
.val-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.val-row label{font-size:11px;color:#555;flex-shrink:0}
.val-row input[type=range]{flex:1}
.val-row span{font-size:11px;font-family:monospace;min-width:36px;text-align:right;color:#333}
.steps-list{list-style:none;max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.step-item{display:flex;align-items:center;gap:6px;font-size:10px;padding:4px 7px;border-radius:4px;background:#f8f8f8;cursor:default}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.step-lbl{flex:1;font-family:monospace}
.step-del{opacity:.35;cursor:pointer;font-size:13px;padding:0 2px;line-height:1}
.step-del:hover{opacity:1;color:#c00}
.act-row{display:flex;gap:4px;margin-top:5px}
.act-btn{flex:1;padding:5px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#fff;color:#333}
.act-btn:hover{background:#f0f0f0}
.act-btn.danger{color:#b00}
@media(prefers-color-scheme:dark){
  body{background:#111}
  canvas{border-color:#333}
  .row input[type=number]{background:#1e1e1e;border-color:#444;color:#eee}
  .mc{background:#1e1e1e}.ml{color:#777}.mv{color:#eee}.mf{color:#444}
  .hint{color:#555}
  button{background:#222;border-color:#444;color:#eee}
  button:hover{background:#2e2e2e}
  .elem-btn{background:#1a1a1a;border-color:#444;color:#ddd}
  .elem-btn:hover{background:#252525}
  .step-item{background:#1e1e1e}.step-lbl{color:#ccc}
  .act-btn{background:#1a1a1a;border-color:#444;color:#ccc}
  .act-btn:hover{background:#252525}
  .sec{color:#888}
  .val-row label{color:#888}.val-row span{color:#ccc}
}
</style>
</head>
<body>
<div style="display:grid;grid-template-columns:1fr 270px;gap:20px;align-items:start;max-width:1120px;width:100%">
<canvas id="cv" width="580" height="580"></canvas>
<div style="display:flex;flex-direction:column;gap:0">

  <!-- Impedance input -->
  <div class="sec">Impedance</div>
  <div class="row"><label>R</label><input type="number" id="vr" value="100" min="0" step="1"><span class="u">Ω</span></div>
  <div class="row"><label>X</label><input type="number" id="vx" value="50" step="1"><span class="u">Ω</span></div>
  <div class="row"><label>Z₀</label><input type="number" id="vz0" value="50" min="1" step="1"><span class="u">Ω</span></div>
  <button onclick="plot()" style="margin-top:4px">Plot</button>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:5px">
    <button onclick="setPreset(50,0)">Default</button>
    <button onclick="setPreset(1e9,0)">Open</button>
    <button onclick="setPreset(0,0)">Short</button>
  </div>
  <p class="hint">or drag the dot on the chart</p>

  <!-- Parameters -->
  <div class="sec" style="margin-top:10px">Parameters</div>
  <div class="metrics">
    <div class="mc"><div class="ml">|Γ| (ρ)</div><div class="mv" id="mrho">—</div><div class="mf">ρ = |Γ|</div></div>
    <div class="mc"><div class="ml">∠Γ</div><div class="mv" id="mang">—</div><div class="mf">arg(Γ)</div></div>
    <div class="mc"><div class="ml">VSWR</div><div class="mv" id="mvswr">—</div><div class="mf">(1+ρ)/(1−ρ)</div></div>
    <div class="mc"><div class="ml">Pwr Refl. Coeff</div><div class="mv" id="mrl">—</div><div class="mf">|Γ|²</div></div>
    <div class="mc" style="grid-column:span 2"><div class="ml">Γ polar</div><div class="mv" id="mgp">—</div><div class="mf">Γ = ρ ∠θ</div></div>
    <div class="mc" style="grid-column:span 2"><div class="ml">Z polar</div><div class="mv" id="mzp">—</div><div class="mf">Z = |Z| ∠φ</div></div>
  </div>

  <!-- Matching network -->
  <div class="sec" style="margin-top:12px">Matching network</div>
  <div class="val-row">
    <label>|X|</label>
    <input type="range" id="xval" min="0.05" max="50" step="0.05" value="10" oninput="document.getElementById('xdisp').textContent=parseFloat(this.value).toFixed(2)">
    <span id="xdisp">10.00</span>
  </div>
  <div class="elem-grid">
    <button class="elem-btn series" onclick="addStep('series','L')"><span class="esym">⌇</span>Series L<br><span style="font-size:9px;color:#666">+jX</span></button>
    <button class="elem-btn series" onclick="addStep('series','C')"><span class="esym">⊣⊢</span>Series C<br><span style="font-size:9px;color:#666">−jX</span></button>
    <button class="elem-btn shunt" onclick="addStep('shunt','L')"><span class="esym">↓</span>Shunt L<br><span style="font-size:9px;color:#666">−jB</span></button>
    <button class="elem-btn shunt" onclick="addStep('shunt','C')"><span class="esym">↓</span>Shunt C<br><span style="font-size:9px;color:#666">+jB</span></button>
  </div>

  <!-- Steps list -->
  <div class="sec" style="margin-top:4px">Matching steps</div>
  <ul class="steps-list" id="steps-list"><li style="font-size:10px;color:#aaa;padding:4px 7px">No steps yet</li></ul>
  <div class="act-row">
    <button class="act-btn danger" onclick="clearSteps()">Clear</button>
    <button class="act-btn" onclick="undoStep()">Undo</button>
  </div>

</div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height,CX=W/2,CY=H/2,R=233;
const OR1=R+13,OR2=R+26,OR3=R+42,OR4=R+56,OR5=R+64;
let Z0=50,zn={r:2,x:1},drag=false;
let dm=matchMedia('(prefers-color-scheme:dark)').matches;

const STEP_COLS=['#1a5fb4','#c01c28','#e66100','#26a269','#613583','#b5820a','#1D9E75','#7B3FC8'];
let steps=[];

function toC(zr,zi){let d=(zr+1)**2+zi**2;if(d<1e-12)d=1e-12;return{x:CX+R*((zr**2+zi**2-1)/d),y:CY-R*(2*zi/d)};}
function frC(px,py){let gr=(px-CX)/R,gi=-(py-CY)/R,d=(1-gr)**2+gi**2;if(d<1e-12)d=1e-12;return{r:(1-gr**2-gi**2)/d,x:2*gi/d};}
function gam(zr,zi){let d=(zr+1)**2+zi**2;if(d<1e-12)d=1e-12;return{r:((zr**2+zi**2)-1)/d,i:2*zi/d};}

function applyStep(z,s){
  if(s.type==='series'){
    return{r:z.r, x:z.x+(s.comp==='L'?s.val:-s.val)};
  }else{
    let d=z.r**2+z.x**2;if(d<1e-12)d=1e-12;
    let yr=z.r/d,yi=-z.x/d;
    yi+=(s.comp==='C'?s.val:-s.val);
    let d2=yr**2+yi**2;if(d2<1e-12)d2=1e-12;
    return{r:yr/d2,x:-yi/d2};
  }
}

function getZSeq(){
  let seq=[{...zn}],cur={...zn};
  for(let s of steps){cur=applyStep(cur,s);seq.push({...cur});}
  return seq;
}

function drawStepArc(za,zb,type,col){
  let p1=toC(za.r,za.x),p2=toC(zb.r,zb.x);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.setLineDash([]);

  if(type==='series'){
    let rv=za.r,cr=R/(1+rv),acx=CX+R*rv/(1+rv);
    let a1=Math.atan2(CY-p1.y,p1.x-acx),a2=Math.atan2(CY-p2.y,p2.x-acx);
    let df=a2-a1;while(df>Math.PI)df-=2*Math.PI;while(df<-Math.PI)df+=2*Math.PI;
    ctx.beginPath();ctx.arc(acx,CY,cr,-a1,-a2,df<0);ctx.stroke();
  }else{
    let d=za.r**2+za.x**2,g2=za.r/d;
    let acx=CX-R*(1-g2)/(1+g2),ar=R/(1+g2);
    let a1=Math.atan2(-(p1.y-CY),p1.x-acx),a2=Math.atan2(-(p2.y-CY),p2.x-acx);
    let df=a2-a1;while(df>Math.PI)df-=2*Math.PI;while(df<-Math.PI)df+=2*Math.PI;
    ctx.beginPath();ctx.arc(acx,CY,ar,-a1,-a2,df<0);ctx.stroke();
  }
  let mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2,dx=p2.x-p1.x,dy=p2.y-p1.y,l=Math.sqrt(dx**2+dy**2);
  if(l>8){
    let ux=dx/l,uy=dy/l,sv=7;
    ctx.fillStyle=col;ctx.beginPath();
    ctx.moveTo(mx+ux*sv,my+uy*sv);
    ctx.lineTo(mx-ux*sv-uy*sv*.55,my-uy*sv+ux*sv*.55);
    ctx.lineTo(mx-ux*sv+uy*sv*.55,my-uy*sv-ux*sv*.55);
    ctx.closePath();ctx.fill();
  }
}

function drawMatchingPath(){
  let seq=getZSeq();
  for(let i=0;i<steps.length;i++){
    let col=STEP_COLS[i%STEP_COLS.length];
    drawStepArc(seq[i],seq[i+1],steps[i].type,col);
    if(i>0){
      let p=toC(seq[i].r,seq[i].x);
      ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.stroke();
    }
  }
  if(steps.length>0){
    let zFin=seq[seq.length-1],pFin=toC(zFin.r,zFin.x);
    let dist=Math.sqrt((pFin.x-CX)**2+(pFin.y-CY)**2);
    ctx.beginPath();ctx.arc(pFin.x,pFin.y,7,0,Math.PI*2);
    ctx.fillStyle=dist<15?'#1D9E75':'#e66100';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(dist<15?'✓':'E',pFin.x,pFin.y);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const bg=dm?'#1a1a1c':'#ffffff';
  const outerBg=dm?'#111':'#f4f4f6';
  const blue='#1133aa';
  const red='#cc1111';
  const tc=dm?'#9aa0c0':'#0a0a40';
  const gridRgb=dm?'155,160,185':'8,8,25';

  ctx.beginPath();ctx.arc(CX,CY,OR5+3,0,Math.PI*2);ctx.fillStyle=outerBg;ctx.fill();

  [[OR5,red,1.5],[OR4,blue,.7],[OR3,blue,.5],[OR2,blue,.7],[OR1,blue,.5]].forEach(([r,c,w])=>{
    ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.stroke();
  });

  for(let deg=0;deg<360;deg++){
    let geom=deg*Math.PI/180,isMaj=deg%10===0,isMed=deg%5===0;
    let len=isMaj?9:isMed?5.5:2.5,r0=OR1+1;
    ctx.beginPath();
    ctx.moveTo(CX+r0*Math.cos(geom-Math.PI/2),CY+r0*Math.sin(geom-Math.PI/2));
    ctx.lineTo(CX+(r0+len)*Math.cos(geom-Math.PI/2),CY+(r0+len)*Math.sin(geom-Math.PI/2));
    ctx.strokeStyle=blue;ctx.lineWidth=isMaj?.85:isMed?.5:.25;ctx.stroke();
  }
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let deg=0;deg<360;deg+=10){
    let a=90-deg;if(a<-180)a+=360;if(a>180)a-=360;
    let geom=deg*Math.PI/180,lr=(OR1+OR2)/2;
    ctx.save();ctx.translate(CX+lr*Math.cos(geom-Math.PI/2),CY+lr*Math.sin(geom-Math.PI/2));
    ctx.rotate(geom+Math.PI/2);ctx.font='5.5px monospace';ctx.fillStyle=blue;ctx.fillText(a,0,0);ctx.restore();
  }
  ctx.font='bold 5px sans-serif';ctx.fillStyle=blue;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('ANGLE OF REFLECTION COEFFICIENT IN DEGREES',CX,CY-(OR1+OR2)/2);

  for(let i=0;i<=500;i++){
    let wt=i/1000,geom=wt*2*Math.PI,isMaj=i%50===0,isMed=i%10===0,isSml=i%5===0;
    let len=isMaj?10:isMed?6.5:isSml?3.5:1.8,r0=OR2+1;
    ctx.beginPath();
    ctx.moveTo(CX+r0*Math.cos(geom-Math.PI/2),CY+r0*Math.sin(geom-Math.PI/2));
    ctx.lineTo(CX+(r0+len)*Math.cos(geom-Math.PI/2),CY+(r0+len)*Math.sin(geom-Math.PI/2));
    ctx.strokeStyle=blue;ctx.lineWidth=isMaj?.85:isMed?.5:.22;ctx.stroke();
  }
  for(let i=0;i<=25;i++){
    let wt=i*0.02;if(wt>=.5)continue;
    let geom=wt*2*Math.PI,lr=(OR2+OR3)/2;
    ctx.save();ctx.translate(CX+lr*Math.cos(geom-Math.PI/2),CY+lr*Math.sin(geom-Math.PI/2));
    ctx.rotate(geom+Math.PI/2);ctx.font='5px monospace';ctx.fillStyle=blue;ctx.fillText(wt.toFixed(2),0,0);ctx.restore();
  }
  ctx.fillStyle=blue;ctx.font='bold 5px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('WAVELENGTHS TOWARD GENERATOR',CX,CY-(OR2+OR3)/2);

  for(let i=0;i<=500;i++){
    let wt=i/1000,geom=-wt*2*Math.PI,isMaj=i%50===0,isMed=i%10===0,isSml=i%5===0;
    let len=isMaj?10:isMed?6.5:isSml?3.5:1.8,r0=OR3+1;
    ctx.beginPath();
    ctx.moveTo(CX+r0*Math.cos(geom-Math.PI/2),CY+r0*Math.sin(geom-Math.PI/2));
    ctx.lineTo(CX+(r0+len)*Math.cos(geom-Math.PI/2),CY+(r0+len)*Math.sin(geom-Math.PI/2));
    ctx.strokeStyle=red;ctx.lineWidth=isMaj?.85:isMed?.5:.22;ctx.stroke();
  }
  for(let i=0;i<=25;i++){
    let wt=i*0.02;if(wt>=.5)continue;
    let geom=-wt*2*Math.PI,lr=(OR3+OR4)/2;
    ctx.save();ctx.translate(CX+lr*Math.cos(geom-Math.PI/2),CY+lr*Math.sin(geom-Math.PI/2));
    ctx.rotate(-geom-Math.PI/2);ctx.font='5px monospace';ctx.fillStyle=red;ctx.fillText(wt.toFixed(2),0,0);ctx.restore();
  }
  ctx.fillStyle=red;ctx.font='bold 5px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('WAVELENGTHS TOWARD LOAD',CX,CY+(OR3+OR4)/2);

  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();

  function dR(rv,a,lw){ctx.beginPath();ctx.arc(CX+R*rv/(1+rv),CY,R/(1+rv),0,Math.PI*2);ctx.strokeStyle=`rgba(${gridRgb},${a})`;ctx.lineWidth=lw;ctx.stroke();}
  function dX(xv,a,lw){for(let s of[1,-1]){ctx.beginPath();ctx.arc(CX+R,CY-R/(s*xv),R/xv,0,Math.PI*2);ctx.strokeStyle=`rgba(${gridRgb},${a})`;ctx.lineWidth=lw;ctx.stroke();}}

  for(let v=0.02;v<0.10;v+=0.02){dR(v,.07,.20);dX(v,.07,.20);}
  [.05,.1,.15,.2,.25,.3,.35,.4,.45,.5,.55,.6,.65,.7,.75,.8,.85,.9,.95,
   1.05,1.1,1.15,1.2,1.25,1.3,1.35,1.4,1.45,1.5,1.55,1.6,1.65,1.7,1.75,1.8,1.85,1.9,1.95,
   2.1,2.2,2.3,2.4,2.6,2.7,2.8,2.9,3.5,4.5,6,8,12,20,40].forEach(v=>{dR(v,.11,.24);dX(v,.09,.24);});
  [.1,.2,.3,.5,.7,1,1.2,1.5,2,3,5,10,20,50].forEach(v=>{dR(v,.26,.44);dX(v,.22,.44);});
  dR(0,.55,1.1);dR(1,.65,1.1);
  [.5,2,5].forEach(v=>dR(v,.44,.72));
  [.5,1,2].forEach(v=>dX(v,.40,.72));

  ctx.beginPath();ctx.moveTo(CX-R,CY);ctx.lineTo(CX+R,CY);ctx.strokeStyle=`rgba(${gridRgb},.55)`;ctx.lineWidth=1.1;ctx.stroke();
  ctx.restore();

  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.strokeStyle=blue;ctx.lineWidth=1.4;ctx.stroke();

  ctx.save();
  ctx.font='6px sans-serif';
  ctx.fillStyle=`rgba(${dm?'180,185,210':'10,10,60'},.38)`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('IMPEDANCE COMPONENT (R/Zo),  OR  CONDUCTANCE COMPONENT (G/Yo)',CX,CY-R*.42);
  ctx.save();ctx.translate(CX-R*.56,CY);ctx.rotate(-Math.PI/2);
  ctx.fillText('REACTANCE COMPONENT (X/Zo),  OR  SUSCEPTANCE COMPONENT (jB/Yo)',0,0);
  ctx.restore();ctx.restore();

  ctx.save();ctx.font='bold 8px sans-serif';
  ctx.fillStyle=`rgba(${dm?'160,170,220':'10,10,80'},.55)`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('INDUCTIVE REACTANCE (+jX)',CX,CY-R*0.72);ctx.restore();

  ctx.save();ctx.font='bold 8px sans-serif';
  ctx.fillStyle=`rgba(${dm?'160,170,220':'10,10,80'},.55)`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('CAPACITIVE REACTANCE (−jX)',CX,CY+R*0.72);ctx.restore();

  ctx.font='6px monospace';ctx.fillStyle=tc;ctx.textAlign='center';ctx.textBaseline='bottom';
  for(let rv of[0.2,.5,1,2,5,10,20]){let cx2=CX+R*rv/(1+rv),cr=R/(1+rv);if(cx2+cr<CX+R-2)ctx.fillText(rv,cx2+cr-1,CY-1);}
  ctx.font='5.5px monospace';ctx.textBaseline='middle';
  for(let xv of[.4,.8,1,1.5,2,3,5]){for(let s of[1,-1]){let p=toC(.001,s*xv);if(Math.sqrt((p.x-CX)**2+(p.y-CY)**2)>R-3)continue;ctx.textAlign='center';ctx.fillText((s>0?'+':'-')+xv+'j',p.x+(s>0?9:-9),p.y);}}
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  ctx.beginPath();ctx.arc(CX,CY,3,0,Math.PI*2);ctx.fillStyle=`rgba(${dm?'140,148,200':'15,15,80'},.6)`;ctx.fill();
  ctx.font='6px monospace';ctx.fillStyle=tc;ctx.fillText('Z₀',CX+5,CY-2);

  drawMatchingPath();

  let g=gam(zn.r,zn.x),gang=Math.atan2(g.i,g.r);
  ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+R*Math.cos(gang),CY-R*Math.sin(gang));
  ctx.strokeStyle='rgba(180,40,40,.35)';ctx.lineWidth=1.0;ctx.setLineDash([5,3]);ctx.stroke();ctx.setLineDash([]);

  let p0=toC(zn.r,zn.x);
  ctx.beginPath();ctx.arc(p0.x,p0.y,9,0,Math.PI*2);ctx.fillStyle='#1D9E75';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Z',p0.x,p0.y);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

function updMetrics(){
  let g=gam(zn.r,zn.x);
  let rho=Math.sqrt(g.r**2+g.i**2),gang=Math.atan2(g.i,g.r)*180/Math.PI;
  let vswr=rho<0.99995?(1+rho)/(1-rho):Infinity;
  let Zr=zn.r*Z0,Zx=zn.x*Z0,Zmag=Math.sqrt(Zr**2+Zx**2),Zang=Math.atan2(Zx,Zr)*180/Math.PI;
  document.getElementById('mrho').textContent=rho.toFixed(4);
  document.getElementById('mang').textContent=gang.toFixed(2)+'°';
  document.getElementById('mvswr').textContent=isFinite(vswr)?vswr.toFixed(3):'∞';
  document.getElementById('mrl').textContent=(rho*rho).toFixed(4);
  document.getElementById('mgp').textContent=rho.toFixed(4)+' ∠ '+gang.toFixed(2)+'°';
  document.getElementById('mzp').textContent=Zmag.toFixed(2)+' Ω ∠ '+Zang.toFixed(2)+'°';
}

function renderStepsList(){
  let ul=document.getElementById('steps-list');
  ul.innerHTML='';
  if(!steps.length){ul.innerHTML='<li style="font-size:10px;color:#aaa;padding:4px 7px">No steps yet</li>';return;}
  steps.forEach((s,i)=>{
    let col=STEP_COLS[i%STEP_COLS.length];
    let typeStr=s.type==='series'?'Series':'Shunt';
    let sign=s.type==='series'?(s.comp==='L'?'+j':'-j'):(s.comp==='C'?'+jB':'-jB');
    let li=document.createElement('li');
    li.className='step-item';
    li.innerHTML=`<span class="step-dot" style="background:${col}"></span>`+
      `<span class="step-lbl">${i+1}. ${typeStr} ${s.comp} &nbsp;${sign}${s.val.toFixed(2)}</span>`+
      `<span class="step-del" onclick="deleteStep(${i})">✕</span>`;
    ul.appendChild(li);
  });
}

function addStep(type,comp){
  let val=parseFloat(document.getElementById('xval').value)||10;
  steps.push({type,comp,val});
  renderStepsList();draw();
}

function deleteStep(i){
  steps.splice(i,1);
  renderStepsList();draw();
}

function undoStep(){
  if(steps.length){steps.pop();renderStepsList();draw();}
}

function clearSteps(){
  steps=[];renderStepsList();draw();
}

function setPreset(r,x){
  let z0=parseFloat(document.getElementById('vz0').value)||50;
  document.getElementById('vr').value=r>=1e8?999999:r;
  document.getElementById('vx').value=x;
  Z0=z0;zn={r:r>=1e8?1e6:r/Z0,x:x/Z0};
  steps=[];renderStepsList();updMetrics();draw();
}

function plot(){
  let r=parseFloat(document.getElementById('vr').value);
  let x=parseFloat(document.getElementById('vx').value);
  let z0=parseFloat(document.getElementById('vz0').value)||50;
  if(isNaN(r)||r<0||isNaN(x)||z0<=0)return;
  Z0=z0;zn={r:r/Z0,x:x/Z0};steps=[];renderStepsList();updMetrics();draw();
}

function gmp(e){let rc=cv.getBoundingClientRect();return{x:(e.clientX-rc.left)*(W/rc.width),y:(e.clientY-rc.top)*(H/rc.height)};}
function hitZ(mx,my){let p=toC(zn.r,zn.x);return Math.sqrt((mx-p.x)**2+(my-p.y)**2)<13;}

cv.addEventListener('mousedown',e=>{let{x,y}=gmp(e);if(hitZ(x,y)){drag=true;cv.style.cursor='grabbing';}});
cv.addEventListener('mousemove',e=>{
  let{x,y}=gmp(e);
  if(drag){
    let d=Math.sqrt((x-CX)**2+(y-CY)**2);
    if(d>R-1){let a=Math.atan2(y-CY,x-CX);x=CX+(R-1)*Math.cos(a);y=CY+(R-1)*Math.sin(a);}
    let z=frC(x,y);zn={r:Math.max(0,z.r),x:z.x};
    document.getElementById('vr').value=(zn.r*Z0).toFixed(1);
    document.getElementById('vx').value=(zn.x*Z0).toFixed(1);
    steps=[];renderStepsList();updMetrics();draw();
  }else cv.style.cursor=hitZ(x,y)?'grab':'crosshair';
});
cv.addEventListener('mouseup',()=>{drag=false;cv.style.cursor='crosshair';});
cv.addEventListener('mouseleave',()=>{drag=false;});
cv.addEventListener('touchstart',e=>{e.preventDefault();let t=e.touches[0],rc=cv.getBoundingClientRect();let x=(t.clientX-rc.left)*(W/rc.width),y=(t.clientY-rc.top)*(H/rc.height);if(hitZ(x,y))drag=true;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!drag)return;let t=e.touches[0],rc=cv.getBoundingClientRect();let x=(t.clientX-rc.left)*(W/rc.width),y=(t.clientY-rc.top)*(H/rc.height);let d=Math.sqrt((x-CX)**2+(y-CY)**2);if(d>R-1){let a=Math.atan2(y-CY,x-CX);x=CX+(R-1)*Math.cos(a);y=CY+(R-1)*Math.sin(a);}let z=frC(x,y);zn={r:Math.max(0,z.r),x:z.x};document.getElementById('vr').value=(zn.r*Z0).toFixed(1);document.getElementById('vx').value=(zn.x*Z0).toFixed(1);steps=[];renderStepsList();updMetrics();draw();},{passive:false});
cv.addEventListener('touchend',()=>{drag=false;});
['vr','vx','vz0'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')plot();}));
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{dm=e.matches;draw();});
updMetrics();draw();
</script>
</body>
</html>
